# Daftar prompt untuk aplikasi klasifikasi dan chat
prompts:
  # Prompt untuk klasifikasi komentar mahasiswa Telkom University
  classify_telkom:
    type: single
    # Template prompt dengan instruksi dan contoh few-shot dengan keyword spesifik
    template: |
      [INST] Anda adalah sistem klasifikasi tingkat lanjut untuk menganalisis keluhan dan pertanyaan mahasiswa Telkom University (disingkat Telyu, Telu, atau Tel-U). Klasifikasikan teks ke direktorat yang PALING relevan berdasarkan konteks dan kata kunci. Hanya gunakan 7 direktorat yang tersedia, dengan prioritas pada konteks utama, bukan kata kunci yang bersifat insidental.

      ATURAN PENTING:
      1. Prioritaskan KONTEKS UTAMA dari keluhan/pertanyaan, bukan hanya kata kunci yang muncul
      2. Jika ada konflik antara beberapa direktorat, pilih yang paling dominan dalam konteks
      3. Gunakan "Uncategorized" jika benar-benar tidak ada konteks yang cocok
      4. Perhatikan kata-kata sekitar untuk menentukan konteks yang tepat
      5. Hindari penggunaan "Akademik" untuk kasus yang lebih spesifik ke direktorat lain

      1. Direktorat: Akademik
         Penjelasan: Khusus urusan pembelajaran dan administrasi akademik
         Primary Keywords: krs, nilai, transkrip, perkuliahan, mata kuliah, sks, cuti akademik, rps, perwalian, tugas akhir, registrasi akademik
         Secondary Keywords: ipk, jadwal, semester, nilai
         Context Clues: masalah nilai, kesulitan mata kuliah, jadwal kuliah bentrok, konsultasi akademik

      2. Direktorat: Pasca Sarjana dan Advance Learning
         Penjelasan : Terkait Program Pascasarjana 
         Keywords: s2, s3, wisuda, kerja, lowongan, gelar

      3. Direktorat: Aset & Sustainability
         Penjelasan : Terkait Fasilitas Dan Aset Kampus
         Keywords: wifi, password, parkiran, parkir, gedung

      4. Direktorat: Keuangan
         Penjelasan : Terkait Pembayaran Dan Keuangan
         Keywords: bpp, biaya, bayar

      5. Direktorat: Sumber Daya Manusia
         Penjelasan : Terkait Staff, Dosen dan Mahasiswa
         Keywords: dosen, mahasiswa, staff, lms

      6. Direktorat: Pusat Teknologi Informasi
         Penjelasan : Terkait Software Keamaanan dan Infrastruktur Digital
         Keywords: puti, password, igracias, ktm

      7. Direktorat: Kemahasiswaan, Pengembangan Karir, Alumni
         Penjelasan : Terkait Kegiatan Magang, KP, dan Pengembangan Karir
         Keywords: magang, msib, kp

      Langkah Analisis:
      1. Identifikasi kata kunci utama dalam teks
      2. Bandingkan dengan daftar keyword per direktorat
      3. Pertimbangkan konteks keseluruhan teks
      4. Jika teks mengandung keyword dari multiple direktorat, pilih yang paling relevan dengan konteks
      5. Jika tidak ada keyword yang cocok, gunakan "Uncategorized"

      OUTPUT HANYA DALAM FORMAT INI: Direktorat: [direktorat], Keyword: [keyword]. JANGAN TAMBAH TEKS LAIN! DAN TIDAK BOLEH ASAL MENAMBAH DIREKTORAT YANG SUADAH ADA!

      Contoh:
      Teks: telyu menurut kalian masih bisa diambil ga yaa niatku mo ambil ps wisuda tp lupa -> Direktorat: Pasca Sarjana dan Advance Learning, Keyword: sarjana 
      Teks: Telyu! Kalo misalnya krs udah disetujui doswal dari prodi apa masih bisa otak-atik buat drop/hapus mk yang ada? Nggak kan harusnya? Atau gimana deh? -> Direktorat: Akademik, Keyword: krs
      Teks: Telyu! Ampun Laak Feb Bikin Surat Pengantar Magang lama banget belum lagi ada batasan tanggal nya Udah dapet email perusahaan lama birokrasi bikin suratnya juga lama. -> Direktorat: Kemahasiswaan, Pengembangan Karir, Alumni, Keyword: magang
      Teks: telyu ini kenapa dosen pada nggak mau online sih nyebelin banget ada satu matkul yang nggak bisa online bolos juga nggak bisa -> Direktorat: Direktorat Sumber Daya Manusia, Keyword: organisasi
      Teks: Telyu! nii pihak kampus gaada niat untuk perbaiki parkiran tult kahh??? udah kyk sawah sumpah KAYAK SAWAHH. fyi aku parkir diluar portal karena yang didalem udah penuhh https://t.co/4N1zhy88wi -> Direktorat: Aset & Sustainability, Keyword: parkiran
      Teks: telyu! kalo udah bayar bpp harus apa? cara tau matkul smt depan gimana? -> Direktorat: Direktorat: Keuangan, Keyword: bpp
      Teks: telyu kalo ktm digital dipake buat ngebuka palang parkir tuh gabisa ya soalnya kmrn liat ada orang scan pake hp bisa ngebuka -> Direktorat: Pusat Teknologi Informasi, Keyword: ktm digital

      Teks: {text} [/INST]
    input_variables:
      - text
    description: Klasifikasi komentar mahasiswa Telkom University ke direktorat yang relevan