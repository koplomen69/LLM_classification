<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .component-card {
            transition: all 0.3s ease;
        }
        .component-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .config-list-item {
            cursor: pointer;
        }
        .config-list-item:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <h1><i class="fas fa-sliders-h"></i> Prompt Management</h1>
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Main
                    </a>
                </div>
                <p class="text-muted">Manage and edit your prompt configurations for classification</p>
            </div>
        </div>

        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-sliders-h"></i> Prompt Configurations
                        </h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-primary btn-sm w-100 mb-3" onclick="showCreateConfigModal()">
                            <i class="fas fa-plus"></i> New Configuration
                        </button>
                        <div id="config-list" class="list-group">
                            <!-- Configurations will be loaded here -->
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <span class="ms-2">Loading configurations...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <div id="config-editor" style="display: none;">
                    <!-- Configuration editor will be loaded here -->
                </div>
                
                <div id="welcome-message" class="text-center py-5">
                    <i class="fas fa-sliders-h fa-3x text-muted mb-3"></i>
                    <h3>Prompt Management</h3>
                    <p class="text-muted">Select a configuration from the sidebar to start editing</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    {% include 'prompt_modals.html' %}

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/prompt_manager.js') }}"></script>
</body>
</html>
